<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Tamara Mints | Artist and Graphic Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container site-header__inner">
    <a href="index.html" class="logo">
      <img src="img/home/logo.png" alt="Tamara Mints - Artist and Graphic Designer">
    </a>
    <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <nav class="nav">
      <a href="index.html" class="nav__link">Home</a>
      <a href="about.html" class="nav__link">About</a>
      <a href="gallery.html" class="nav__link">Gallery</a>
      <a href="design-portfolio.html" class="nav__link">Design Portfolio</a>
      <a href="blog.html" class="nav__link">Blog</a>
      <a href="contact.html" class="nav__link nav__link--active">Contact</a>
      <a href="book-art.html" class="nav__link">Book Art</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-banner">
    <img src="img/home/hero-2-ballerina.jpg" alt="">
    <div class="page-banner__title"><h1>Contact</h1></div>
  </div>

  <section class="contact">
    <div class="container contact__grid">
      <div class="contact__info">
        <h3>Get in touch</h3>
        <p><strong>Location:</strong> Rishon LeZion, Israel</p>
        <iframe class="contact__map" loading="lazy" src="https://maps.google.com/maps?q=Rishon%20LeZion%2C%20Israel&t=&z=12&ie=UTF8&iwloc=&output=embed"></iframe>
      </div>

      <form class="contact__form">
        <div class="form-field">
          <label for="name">Your Name (required)</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-field">
          <label for="email">Your Email (required)</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-field">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject">
        </div>
        <div class="form-field">
          <label for="message">Your Message</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <button type="submit" class="btn">Send</button>
      </form>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <p>© 2026 Tamara Mints. All rights reserved.</p>
  </div>
</footer>

<script src="js/main.js"></script>
</body>
</html>
